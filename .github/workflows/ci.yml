name: CI

on:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick:
    name: Quick Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun run validate quick

  test:
    name: Unit Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun run test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quick, test]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: packages/extension/dist/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: packages/app/dist/
          retention-days: 14

  core-loop:
    name: Core Loop E2E
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun run test:e2e:extension
